project:
  name: 0617_4d_mib_screening
  output_dir: outputs/0617_4d

data:
  backend: hyperspy_pyxem
  directory: data/0617-4d
  pattern: "*.mib"
  # 0: 1_512x512_ss15.63nm...
  # 1: 2_512x512_ss7.6nm...
  index: 0
  scan_shape: [512, 512]
  detector_shape: [256, 256]
  dtype: uint16
  lazy: true
  cache: outputs/cache/0617_4d
  chunks:
    navigation: [4, 4]
    signal: [96, 96]

preprocess:
  # Keep central 192x192 diffraction pixels, then bin to 96x96.
  q_crop: [32, 224, 32, 224]
  q_bin: 2
  # Reduce 512x512 scan to 128x128 for first-pass screening.
  r_bin: 4

geometry:
  center: null
  radial_bins: 96

virtual_images:
  masks:
    bf: {inner_radius: 0, outer_radius: 6}
    adf: {inner_radius: 14, outer_radius: 38}
    haadf: {inner_radius: 38, outer_radius: 67}
    ring_1: {inner_radius: 8, outer_radius: 18}
    ring_2: {inner_radius: 18, outer_radius: 34}
    ring_3: {inner_radius: 34, outer_radius: 55}

phase_screening:
  n_components: 4
  n_clusters: 4
  method: pca_nmf_cluster
  candidate_phases:
    - name: Ti-bcc
      cif: data/0617-4d/Ti-bcc.cif
      reference_profile: null
    - name: Ti-hcp
      cif: data/0617-4d/Ti-hcp.cif
      reference_profile: null

orientation:
  preview_binning: [4, 4]
  # ROI is expressed after preprocess.r_bin, so this is a central 64x64 area
  # in the 128x128 first-pass scan grid.
  roi: [32, 96, 32, 96]
  confidence_threshold: 0.05

roi_bragg:
  enabled: false
  roi: [192, 320, 192, 320]
  thin_r: 2
  bin_q: 2
  mem: MEMMAP
