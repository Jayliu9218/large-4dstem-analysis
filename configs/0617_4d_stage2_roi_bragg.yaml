# Stage 2A: ROI Bragg Detection Configuration
# ==============================================
# Consumes a Stage-1 output directory and runs py4DSTEM Bragg-disk
# detection on selected ROI candidates.
#
# Usage:
#   fourdstem-stage2 --config configs/stage2_roi_bragg.yaml

# Path to the Stage-1 output directory containing stage1_summary.json.
stage1_dir: outputs/0617_4d_1

# Optional: explicit path to the original 4D-STEM data file.  When
# omitted, the input_path recorded in provenance.json is used.
# data_path: data/0617-4d/2_512x512_ss7.6nm_0.55ms_c2 50um_CL91mm_0.75mrad_spot7_0.022nA_GL3_mag26000k_12b 0921.mib

# Optional: override the default output directory.  Defaults to
# <stage1_dir>/stage2/roi_bragg/.
output_dir: null

# ROI source: "roi_candidates" (default) reads the manifest's
# roi_candidates.yaml, or provide an explicit path to a YAML file.
roi_source: roi_candidates

# Cap the number of ROIs processed (null = all candidates).
max_rois: null

# -- Extraction parameters --
thin_r: 2    # Navigation thinning factor
bin_q: 2     # Detector binning factor

# py4DSTEM memory mode: "MEMMAP" (recommended for large files) or "RAM".
mem: MEMMAP

# Optional raw navigation shape [ny, nx] passed to py4DSTEM.import_file.
# Leave null to infer scan_shape as stage1 nav_shape * r_bin.
# Set this explicitly if the detector/scan shape reported by py4DSTEM does
# not match the inferred value.
scan_shape: null

# -- py4DSTEM Bragg-disk detection parameters --
corr_power: 1.0
sigma_cc: 1
edge_boundary: 10
# Minimum relative intensity for Bragg disk detection.  0.05 is py4DSTEM's
# default but often admits central-beam tails and background fluctuations.
# 0.10–0.15 is more selective for genuine diffraction disks.
min_relative_intensity: 0.10
min_peak_spacing: 4
subpixel: poly
max_num_peaks: 70
cuda: false

# Central exclusion radius in binned detector pixels (after bin_q).
# Pixels within this distance of the beam centre are zeroed in the Bragg
# vector map.  Use to suppress central-beam / bright-field-tail detections
# that are not real Bragg disks.  At bin_q=2 and 256×256 detector, the
# binned shape is 128×128; a radius of 30 px excludes ~5.5% of the
# detector area around the beam centre.  Set to 0 to disable.
central_exclusion_radius: 30

# Save the extracted 4D sub-cube (roi_data.npy) for each ROI.
# This file can be large (10s–100s of MB per ROI); set to true only
# if you need the raw data for external tools or Stage 2B template
# matching.  Stage 2B can still run mock scoring without it.
save_roi_data: true
