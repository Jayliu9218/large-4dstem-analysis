# Stage 2A: ROI Bragg Detection — 1_R4Q2_L
# ==========================================
# Consumes Stage-1 output and runs py4DSTEM Bragg-disk detection.

# Path to the Stage-1 output directory containing stage1_summary.json.
stage1_dir: outputs/1_R4Q2_L

# Optional: explicit path to the original 4D-STEM data file.
data_path: data/0617-4d/1_R4Q2_L.h5

# Optional: override the default output directory.
output_dir: null

# ROI source: "roi_candidates" (default) reads roi_candidates.yaml.
roi_source: roi_candidates

# Cap the number of ROIs processed (null = all candidates).
max_rois: null

# -- Extraction parameters --
thin_r: 1    # Already at 128×128 nav — keep all positions
bin_q: 1     # Detector already binned to 128×128 (Q_bin=2 applied during export)

# py4DSTEM memory mode.
mem: MEMMAP

# H5 file — scan shape auto-detected by py4DSTEM.read().
scan_shape: null

# -- py4DSTEM Bragg-disk detection parameters --
corr_power: 1.0
sigma_cc: 1
edge_boundary: 10
min_relative_intensity: 0.10
min_peak_spacing: 4
subpixel: poly
max_num_peaks: 70
cuda: false

# Central exclusion radius in detector pixels (detector is 128×128, not binned further).
central_exclusion_radius: 20

# Save the extracted 4D sub-cube (roi_data.npy) for each ROI.
save_roi_data: true
