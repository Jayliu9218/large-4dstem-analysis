project:
  name: 1_R4Q2_crop64_screening
  output_dir: outputs/1_R4Q2_crop64

data:
  path: data/0617-4d/1_0_64_0_64.h5
  lazy: false
  backend: h5py
  cache: outputs/cache/1_R4Q2_crop64
  chunks:
    navigation: [16, 16]
    signal: [128, 128]

preprocess:
  # 256x256 detector → bin to 128x128 for fingerprinting
  # 64x64 nav → keep as-is (already cropped)
  q_crop: null
  q_bin: 2
  r_bin: 1

geometry:
  center: null
  radial_bins: 64

virtual_images:
  masks:
    bf: {inner_radius: 0, outer_radius: 10}
    adf: {inner_radius: 18, outer_radius: 55}
    haadf: {inner_radius: 55, outer_radius: 115}
    ring_1: {inner_radius: 14, outer_radius: 30}
    ring_2: {inner_radius: 30, outer_radius: 54}
    ring_3: {inner_radius: 54, outer_radius: 98}

phase_screening:
  n_components: 4
  n_clusters: 4
  method: pca_nmf_cluster
  candidate_phases:
    - name: Ti-bcc
      cif: data/0617-4d/Ti-bcc.cif
      reference_profile: null
    - name: Ti-hcp
      cif: data/0617-4d/Ti-hcp.cif
      reference_profile: null

orientation:
  preview_binning: [4, 4]
  roi: [0, 64, 0, 64]
  confidence_threshold: 0.05

sample_mask:
  enabled: true
  source: adf
  method: percentile
  percentile: 15
  fill_holes: true
  min_size: 20
  background_label: -1

roi_bragg:
  enabled: false
  roi: [24, 40, 24, 40]
  thin_r: 2
  bin_q: 2
  mem: MEMMAP
