project:
  name: 0617_4d_stage1_fingerprint_class_screening
  output_dir: outputs/0617_4d_stage1

data:
  backend: hyperspy_pyxem
  directory: data/0617-4d
  pattern: "*.mib"
  index: 1
  scan_shape: [512, 512]
  detector_shape: [256, 256]
  dtype: uint16
  lazy: true
  cache: outputs/cache/0617_4d_stage1
  chunks:
    navigation: [4, 4]
    signal: [112, 112]

preprocess:
  q_crop: [16, 240, 16, 240]
  q_bin: 2
  r_bin: 2

geometry:
  center: null
  radial_bins: 112

virtual_images:
  masks:
    bf: {inner_radius: 0, outer_radius: 7}
    adf: {inner_radius: 16, outer_radius: 44}
    haadf: {inner_radius: 44, outer_radius: 78}
    ring_1: {inner_radius: 9, outer_radius: 21}
    ring_2: {inner_radius: 21, outer_radius: 40}
    ring_3: {inner_radius: 40, outer_radius: 64}

phase_screening:
  n_components: 4
  n_clusters: 4
  method: pca_nmf_cluster
  candidate_phases:
    - name: Ti-bcc
      cif: data/0617-4d/Ti-bcc.cif
      reference_profile: null
    - name: Ti-hcp
      cif: data/0617-4d/Ti-hcp.cif
      reference_profile: null

orientation:
  preview_binning: [4, 4]
  roi: [64, 64, 192, 192]
  confidence_threshold: 0.05

roi_bragg:
  enabled: false
  roi: [192, 320, 192, 320]
  thin_r: 2
  bin_q: 2
  mem: MEMMAP
