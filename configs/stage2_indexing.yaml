# Stage 2B: Phase / Orientation Indexing Contract
# =================================================
# Consumes accepted Stage 2A ROI Bragg outputs. This config is for the
# indexing scaffold; full template generation and orientation search are
# intentionally added after real-data Stage 2A acceptance.

# Stage 2A output directory containing stage2_summary.json.
stage2_dir: outputs/0617_4d_stage1/stage2/roi_bragg

# Optional output directory. Defaults to <stage2_dir>/stage2b_indexing/.
output_dir: null

# Analytic CIF-to-template generation. If reciprocal_pixels_per_inv_angstrom
# is null, templates are auto-scaled to the detector radius as a first-pass
# indexing aid. Set it explicitly once detector calibration is known.
template_generation:
  max_index: 4
  # Single-zone kinematic approximation. The detector template is an
  # orthographic projection perpendicular to this reciprocal-space direction.
  # In-plane orientation search rotates around this axis only; grain tilt,
  # precession, excitation error, and multi-zone coverage are not modeled.
  zone_axis: [0, 0, 1]
  orientation_step_deg: 5
  orientations_deg: null
  peak_sigma_px: 1.2
  reciprocal_pixels_per_inv_angstrom: null
  intensity_power: 2.0

# Candidate CIFs. CIFs with lattice parameters generate analytic kinematic
# templates; reference_peaks is retained only for mocked contract tests.
candidate_cifs:
  # - name: candidate_phase
  #   phase: unknown
  #   path: data/cifs/candidate_phase.cif
  #   reference_peaks: []
