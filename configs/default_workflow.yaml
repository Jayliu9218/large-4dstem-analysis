project:
  name: large_4dstem_analysis
  output_dir: outputs/default_workflow

data:
  # Use "synthetic://demo" until a real .mib/.npy/.npz dataset is available.
  path: synthetic://demo
  lazy: true
  cache: outputs/cache
  chunks:
    navigation: [8, 8]
    signal: [64, 64]
  # Real MIB example:
  # path: D:/path/to/your/file.mib
  # scan_shape: [512, 512]

preprocess:
  # Diffraction crop as [qy0, qy1, qx0, qx1]; null disables cropping.
  q_crop: null
  q_bin: 1
  r_bin: 1

geometry:
  center: null
  radial_bins: 48

virtual_images:
  masks:
    bf: {inner_radius: 0, outer_radius: 8}
    adf: {inner_radius: 10, outer_radius: 22}
    haadf: {inner_radius: 22, outer_radius: 31}

phase_screening:
  n_components: 3
  n_clusters: 3
  method: pca_nmf_cluster
  candidate_phases:
    - name: phase_alpha
      reference_profile: null
    - name: phase_beta
      reference_profile: null

orientation:
  preview_binning: [2, 2]
  roi: [4, 12, 4, 12]
  confidence_threshold: 0.05

sample_mask:
  enabled: true
  source: adf
  method: percentile
  percentile: 15
  fill_holes: true
  min_size: 100
  background_label: -1

roi_bragg:
  enabled: false
  roi: [192, 320, 192, 320]
  thin_r: 2
  bin_q: 2
  mem: MEMMAP
