project:
  name: large_4dstem_analysis
  output_dir: outputs

data:
  # Use "synthetic://demo" until a real file is available.
  path: synthetic://demo
  lazy: true
  cache: outputs/cache
  chunks:
    navigation: [8, 8]
    signal: [64, 64]

geometry:
  center: null
  radial_bins: 48

virtual_images:
  masks:
    bf: {inner_radius: 0, outer_radius: 8}
    adf: {inner_radius: 10, outer_radius: 22}
    haadf: {inner_radius: 22, outer_radius: 31}

phase_screening:
  n_components: 3
  n_clusters: 3
  method: pca_nmf_cluster
  candidate_phases:
    - name: phase_alpha
      reference_profile: null
    - name: phase_beta
      reference_profile: null

orientation:
  preview_binning: [2, 2]
  roi: [4, 4, 12, 12]
  confidence_threshold: 0.05
