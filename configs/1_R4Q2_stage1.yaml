project:
  name: 1_R4Q2_screening
  output_dir: outputs/1_R4Q2

data:
  path: data/0617-4d/1_R4Q2.h5
  lazy: false
  backend: h5py
  cache: outputs/cache/1_R4Q2
  chunks:
    navigation: [32, 32]
    signal: [64, 64]

preprocess:
  # 128x128 detector → keep full
  q_crop: null
  q_bin: 1
  # 128x128 scan → 64x64 for first-pass screening
  r_bin: 2

geometry:
  center: [63.5, 63.4]
  radial_bins: 64

virtual_images:
  masks:
    bf: {inner_radius: 0, outer_radius: 6}
    adf: {inner_radius: 10, outer_radius: 30}
    haadf: {inner_radius: 30, outer_radius: 58}
    ring_1: {inner_radius: 8, outer_radius: 16}
    ring_2: {inner_radius: 16, outer_radius: 28}
    ring_3: {inner_radius: 28, outer_radius: 50}

phase_screening:
  n_components: 4
  n_clusters: 4
  method: pca_nmf_cluster
  candidate_phases:
    - name: Ti-bcc
      cif: data/0617-4d/Ti-bcc.cif
      reference_profile: null
    - name: Ti-hcp
      cif: data/0617-4d/Ti-hcp.cif
      reference_profile: null

orientation:
  preview_binning: [4, 4]
  roi: [8, 56, 8, 56]
  confidence_threshold: 0.05

sample_mask:
  enabled: true
  source: adf
  method: percentile
  percentile: 15
  fill_holes: true
  min_size: 100
  background_label: -1

roi_bragg:
  enabled: false
  roi: [24, 40, 24, 40]
  thin_r: 2
  bin_q: 2
  mem: MEMMAP
