name: large-4dstem
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Runtime ──────────────────────────────────────────────────────────
  - python>=3.10,<3.13          # py4DSTEM / pyxem are not yet 3.13-ready
  - numpy>=1.24
  - pyyaml>=6
  - scikit-learn>=1.3
  - pip

  # ── Development / test ────────────────────────────────────────────────
  - pytest>=8

  # ── pip-only packages (not on conda-forge or fresher on PyPI) ─────────
  - pip:
      - hyperspy>=2
      - pyxem>=0.20
      - git+https://github.com/py4dstem/py4DSTEM.git@dev
      - dask[array]>=2024.1
      - zarr>=2
